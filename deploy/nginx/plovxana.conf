##
# Nginx vhost для PlovХана.
#
# Важно: deploy/deploy.sh копирует этот файл на VPS в /etc/nginx/sites-available/plovxana,
# поэтому HTTPS-настройки должны жить здесь (иначе следующий деплой «сотрёт» certbot-правки).
##

# -----------------------------------------------------------------------------
# 80 (IP / default) — оставляем ответы по IP для health-check GitHub Actions.
# -----------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 178.104.163.216 _;

    client_max_body_size 5m;

    # --- Compression ---------------------------------------------------------
    # gzip уже включён в /etc/nginx/nginx.conf; добавляем brotli (модули libnginx-mod-http-brotli-*).
    # brotli_static on — отдаст .br-файл рядом с ассетом, если Next его сгенерит.
    brotli on;
    brotli_comp_level 5;
    brotli_static on;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/manifest+json
        application/vnd.api+json
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/ttf
        font/eot
        font/otf
        image/svg+xml;

    # --- Static hashed Next.js assets ---------------------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header x-tenant-slug plovxana;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # --- Декор-фото (hero, паттерны) ----------------------------------------
    # proxy_hide_header обязателен — иначе Next.js подпихивает Cache-Control: max-age=0.
    location /photo/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header x-tenant-slug plovxana;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
    }

    # --- App -----------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header x-tenant-slug plovxana;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# -----------------------------------------------------------------------------
# 80 (domain) — редиректим всё на HTTPS + канонический apex.
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name plovxanapvl.com www.plovxanapvl.com;
    return 301 https://plovxanapvl.com$request_uri;
}

# -----------------------------------------------------------------------------
# 443 (www) — редирект на apex, чтобы не плодить SEO-дубли.
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.plovxanapvl.com;

    ssl_certificate /etc/letsencrypt/live/plovxanapvl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plovxanapvl.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://plovxanapvl.com$request_uri;
}

# -----------------------------------------------------------------------------
# 443 (apex) — основной HTTPS.
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name plovxanapvl.com;

    ssl_certificate /etc/letsencrypt/live/plovxanapvl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plovxanapvl.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS включаем после того как HTTPS стабилен.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # OCSP stapling (ускоряет TLS-handshake).
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/plovxanapvl.com/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    client_max_body_size 5m;

    brotli on;
    brotli_comp_level 5;
    brotli_static on;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/manifest+json
        application/vnd.api+json
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/ttf
        font/eot
        font/otf
        image/svg+xml;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header x-tenant-slug plovxana;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /photo/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header x-tenant-slug plovxana;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header x-tenant-slug plovxana;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
