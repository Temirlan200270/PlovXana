server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 5m;

    # --- Compression ---------------------------------------------------------
    # gzip уже включён в /etc/nginx/nginx.conf; добавляем brotli (модули libnginx-mod-http-brotli-*).
    # brotli_static on — отдаст .br-файл рядом с ассетом, если Next его сгенерит.
    brotli on;
    brotli_comp_level 5;
    brotli_static on;
    brotli_min_length 1024;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/manifest+json
        application/vnd.api+json
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/ttf
        font/eot
        font/otf
        image/svg+xml;

    # --- Static hashed Next.js assets ---------------------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # --- Декор-фото (hero, паттерны) ----------------------------------------
    # proxy_hide_header обязателен — иначе Next.js подпихивает Cache-Control: max-age=0.
    location /photo/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
    }

    # --- App -----------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
